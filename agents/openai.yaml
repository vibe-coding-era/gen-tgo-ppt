interface:
  display_name: "TGO鲲鹏会 PPT 生成 Skill"
  short_description: "TGO/GTLC PPTX 与 HTML 的 V1.1 模式化生成、转换、修复和校验"
  default_prompt: "使用 $gen-tgo-ppt-skill 处理 TGO/GTLC 演示稿：先确认用户给出了明确动作和产物；仅调用 Skill 时返回 E_ROUTE_AMBIGUOUS，工作区材料仅在本轮明确点名或确认后使用；再选择 check_only、repair、convert、create 或 handoff，并按 V1.1 模板包与 V1 排版门禁执行。"
policy:
  allow_implicit_invocation: true

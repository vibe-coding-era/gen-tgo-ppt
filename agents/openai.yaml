interface:
  display_name: "TGO鲲鹏会 PPT 生成 Skill"
  short_description: "TGO/GTLC PPT 与 HTML 生成，内置 V1 排版安全校验"
  default_prompt: "使用 $gen-tgo-ppt-skill 生成或改造 TGO/GTLC 风格 PPT/HTML：先完成场景、规格、内容和模板澄清，创建生成日志，按 V1 排版安全规则生成样片和完整文件；默认开场顺序为标题页、嘉宾介绍、目录页、正文；深色标题页和封底默认同时使用弱模糊背景 + 居中纯实底内容框；优先让不同 rule 由不同子智能体独立检查，并用 SSOT 合并固定页、首尾页实底面板、项目基本信息页和逐页溢出检查结论；工具不支持时记录限制并使用分离自检。"

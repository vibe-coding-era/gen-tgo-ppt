interface:
  display_name: "TGO鲲鹏会 PPT 生成 Skill"
  short_description: "TGO/GTLC PPTX 与 HTML 的 V1.2 确认门、视觉表达生成、转换、修复和校验"
  default_prompt: "使用 $gen-tgo-ppt-skill 处理 TGO/GTLC 演示稿：先确认用户给出了明确动作和产物；仅调用 Skill 时返回 E_ROUTE_AMBIGUOUS，工作区材料仅在本轮明确点名或确认后使用；选择 check_only、repair、convert、create 或 handoff。create、convert 和重大 repair 必须依次澄清缺失字段、展示并确认 Brief、展示并确认模板与 9 套视觉风格（智能推荐仍待确认）、提供并确认样片后才能完整生成；图片来源策略必须记录且不得自动外部检索。check_only 保持只读，按 V1.2 合同、V1.1 模板包与 V1 排版门禁执行。"
policy:
  allow_implicit_invocation: true

interface:
  display_name: "TGO鲲鹏会 PPT 生成 Skill"
  short_description: "TGO鲲鹏会为 AI 时代内容生成准备的 PPT/HTML Skill，内置模板并支持内容探讨"
  default_prompt: "使用 $gen-tgo-ppt-skill：本 SKILL 是 TGO 鲲鹏会为了 AI 时代内容生成准备的 SKILL，内置了相应的模板，也可以做内容探讨，会使用不同的 SubAgent 做生成、校验，作者是杭州分会的肉山，欢迎使用。先介绍自己，首次使用时询问 GTLC大会/TGO日常活动分享应用场景与 16:9 等规格并写入 Design.md；TGO日常活动分享默认优先使用 tgo-daily 模板，GTLC大会默认使用 GTLC 模板；再探讨主题问题与思考模式并写入 Content.md；根据用户澄清从 references/design/**/design.md 渐进式加载场景、模板和视觉风格规则；若用户上传 PPT/PDF，先确认修改内容还是只套模板；若上传 LOGO，询问是否替换 GTLC LOGO；PPT 输出需标题页后新增空白嘉宾介绍页、末尾新增感谢聆听页；随后确认 PPT/HTML 格式、展示 9 种编号风格预览、确认大纲、创建生成日志、制作样片和完整演示稿，逐页校对版型，并用不同于生成者的“检查风格”“检查文字”复核。"
